spring.application.name=QuanLyKhoNguyenLieu
server.port=8080

# 1. Kết nối Database
spring.datasource.url=jdbc:mysql://localhost:3306/quanlykhonguyenlieu
spring.datasource.username=root
spring.datasource.password=123456

# 2. Cấu hình Hibernate (QUAN TRỌNG NHẤT ĐỂ SỬA LỖI SQL)
# Dòng này ép Hibernate dùng đúng tên trong @Column, không tự thêm dấu gạch dưới
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
# Hiển thị câu lệnh SQL ra console để bạn kiểm tra
spring.jpa.show-sql=true

# 3. Log (Rút gọn chỉ để lại cái cần thiết)
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.example.demo=DEBUG

# 4. Hiển thị thông báo lỗi chi tiết ra Postman/Trình duyệt
server.error.include-message=always