<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản Lý Kho Nguyên Liệu</title>
  <meta name="description" content="Phần mềm quản lý kho nguyên liệu - Hệ thống nhập xuất tồn kho">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login-page" class="login-page">
  <div class="login-card">
    <div class="logo-icon">📦</div>
    <h1>Quản Lý Kho Nguyên Liệu</h1>
    <p class="subtitle">Đăng nhập để tiếp tục</p>
    <form id="login-form">
      <div class="form-group">
        <label for="login-username">Tên đăng nhập</label>
        <input type="text" id="login-username" class="form-control" placeholder="Nhập tên đăng nhập">
      </div>
      <div class="form-group">
        <label for="login-password">Mật khẩu</label>
        <input type="password" id="login-password" class="form-control" placeholder="Nhập mật khẩu">
      </div>
      <button type="submit" class="btn btn-primary btn-block" style="margin-top:8px">Đăng nhập</button>
    </form>
    <p class="form-hint" style="margin-top:16px; text-align:center">
      Demo: nhập <strong>admin</strong> → Quản lý | tên khác → Nhân viên
    </p>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const loginForm = document.querySelector('#login-form');
    if (loginForm) {
      loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const username = document.querySelector('#login-username').value.trim();
        const password = document.querySelector('#login-password').value.trim();

        if (!username || !password) {
          alert('Vui lòng nhập đầy đủ tên đăng nhập và mật khẩu.');
          return;
        }

        // Điều hướng dựa trên tên đăng nhập theo đúng logic cũ
        if (username === 'admin') {
          window.location.href = 'quanly.html';
        } else {
          window.location.href = 'nhanvien.html';
        }
      });
    }
  });
</script>
</body>
</html>
